info:
  name: Players - find
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v1/players/:playerId"
  params:
    - name: playerId
      value: "{{playerId}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Find a player.

  **Authentication**
  - Required scope: `read:players`.

  **Path**
  - `{{playerId}}` - The ID of the player.
