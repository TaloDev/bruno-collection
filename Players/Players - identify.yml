info:
  name: Players - identify
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1/players/identify?service={{service}}&identifier={{identifier}}"
  params:
    - name: service
      value: "{{service}}"
      type: query
    - name: identifier
      value: "{{identifier}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        bru.setVar('aliasId', data.alias.id)
        bru.setVar('playerId', data.alias.player.id)
        bru.setVar('socketToken', data.socketToken)
        if (data.sessionToken) {
          bru.setVar('sessionToken', data.sessionToken)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Identify a player. A new player can be created if one does not exist for the given service+identifier pair.

  **Authentication**
  - Required scope: `read:players`. Add `write:players` if you want the request to create new players.
  - Authenticated by: `X-Talo-Session` is required when the resolved alias's service is `talo`.

  **Query**
  - `{{service}}` - An arbitrary name for how the identifier is chosen (e.g. `anonymous`, `username`, `email`).
  - `{{identifier}}` - The unique identifier (username, email, or numeric ID).
