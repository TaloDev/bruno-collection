info:
  name: Players - update
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/v1/players/:playerId"
  params:
    - name: playerId
      value: "{{playerId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "props": [
          {
            "key": "currentHealth",
            "value": "100"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Update a player's props.

  **Authentication**
  - Required scope: `write:players`.

  **Path**
  - `{{playerId}}` - The ID of the player.

  **Body**
  - `props` (optional) - Key/value pairs. Set `value` to `null` to delete a prop.
