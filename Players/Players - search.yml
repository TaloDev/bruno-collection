info:
  name: Players - search
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/v1/players/search?query={{query}}"
  params:
    - name: query
      value: "{{query}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Search for players.

  **Authentication**
  - Required scope: `read:players`.

  **Query**
  - `query` - Search by IDs, prop values, alias identifiers, and display names.
