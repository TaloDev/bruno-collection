info:
  name: Leaderboard - list entries
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1/leaderboards/:leaderboardInternalName/entries"
  params:
    - name: leaderboardInternalName
      value: "{{leaderboardInternalName}}"
      type: path
    - name: page
      value: "0"
      type: query
    - name: aliasId
      value: "{{aliasId}}"
      type: query
      disabled: true
    - name: withDeleted
      value: "0"
      type: query
      disabled: true
    - name: propKey
      value: ""
      type: query
      disabled: true
    - name: propValue
      value: ""
      type: query
      disabled: true
    - name: startDate
      value: ""
      type: query
      disabled: true
    - name: endDate
      value: ""
      type: query
      disabled: true
    - name: aliasService
      value: ""
      type: query
      disabled: true
    - name: playerId
      value: "{{playerId}}"
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get a leaderboard's entries. 50 entries returned per page, in the leaderboard's sort order.

  **Authentication**
  - Required scope: `read:leaderboards`.

  **Path**
  - `{{leaderboardInternalName}}` - The internal name of the leaderboard.

  **Query**
  - `page` (optional, default `0`) - The current pagination index.
  - `aliasId` (optional) - Only return entries for this alias ID.
  - `withDeleted` (optional) - Include entries that were deleted by a refresh interval (`0` or `1`).
  - `propKey` (optional) - Only return entries with this prop key.
  - `propValue` (optional) - Only return entries with a matching prop key and value.
  - `startDate` (optional) - UTC date (YYYY-MM-DD), ISO 8601 datetime, or millisecond timestamp.
  - `endDate` (optional) - Same format as `startDate`.
  - `aliasService` (optional) - Only return entries for this alias service (e.g. `steam`, `google_play_games`, `username`).
  - `playerId` (optional) - Only return entries for this player ID.
