info:
  name: Groups - find
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/v1/player-groups/:groupId"
  params:
    - name: membersPage
      value: "0"
      type: query
    - name: groupId
      value: "{{groupId}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get a group and its members.

  **Authentication**
  - Required scope: `read:playerGroups`.

  **Path**
  - `{{groupId}}` - The ID of the group.

  **Query**
  - `membersPage` (optional, default `0`) - Pagination index for group members.
