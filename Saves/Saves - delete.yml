info:
  name: Saves - delete
  type: http
  seq: 4

http:
  method: DELETE
  url: "{{baseUrl}}/v1/game-saves/:saveId"
  params:
    - name: saveId
      value: "{{saveId}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Delete a save.

  **Authentication**
  - Required scope: `write:gameSaves`.
  - Authenticated by: `X-Talo-Player`.

  **Path**
  - `{{saveId}}` - The ID of the save.
