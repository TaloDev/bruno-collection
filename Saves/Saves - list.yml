info:
  name: Saves - list
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v1/game-saves"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get a player's saves.

  **Authentication**
  - Required scope: `read:gameSaves`.
  - Authenticated by: `X-Talo-Player`.
