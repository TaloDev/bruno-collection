info:
  name: Stats - one for player
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/v1/game-stats/:statInternalName/player-stat"
  params:
    - name: statInternalName
      value: "{{statInternalName}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get the current value of a player's stat.

  **Authentication**
  - Required scope: `read:gameStats`.
  - Authenticated by: `X-Talo-Alias`.

  **Path**
  - `{{statInternalName}}` - The internal name of the stat.
