info:
  name: Stats - find
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v1/game-stats/:statInternalName"
  params:
    - name: statInternalName
      value: "{{statInternalName}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get an individual game stat.

  **Authentication**
  - Required scope: `read:gameStats`.

  **Path**
  - `{{statInternalName}}` - The internal name of the stat.
