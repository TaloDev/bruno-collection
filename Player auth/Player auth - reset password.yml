info:
  name: Player auth - reset password
  type: http
  seq: 12

http:
  method: POST
  url: "{{baseUrl}}/v1/players/auth/reset_password"
  body:
    type: json
    data: |-
      {
        "code": "{{resetCode}}",
        "password": "{{newPassword}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Reset the password of a player account (invalidates any existing session tokens).

  **Authentication**
  - Required scopes: `read:players`, `write:players`.

  **Body**
  - `code` - The 6-digit code sent to the email (as a string).
  - `password` - The new password for the player.
