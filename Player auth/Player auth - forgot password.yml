info:
  name: Player auth - forgot password
  type: http
  seq: 11

http:
  method: POST
  url: "{{baseUrl}}/v1/players/auth/forgot_password"
  body:
    type: json
    data: |-
      {
        "email": "{{email}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Send a password reset email to an email address.

  **Authentication**
  - Required scopes: `read:players`, `write:players`.

  **Body**
  - `email` - The email address. If no player with this email exists, the request is silently ignored.
