info:
  name: Player auth - change password
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/v1/players/auth/change_password"
  body:
    type: json
    data: |-
      {
        "currentPassword": "{{currentPassword}}",
        "newPassword": "{{newPassword}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Change the password of a player account.

  **Authentication**
  - Required scopes: `read:players`, `write:players`.
  - Authenticated by: `X-Talo-Player` + `X-Talo-Alias` + `X-Talo-Session`.

  **Body**
  - `currentPassword` - The current password of the player.
  - `newPassword` - The new password for the player.
