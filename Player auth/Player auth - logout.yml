info:
  name: Player auth - logout
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/v1/players/auth/logout"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Logout of a player account (and invalidate the session token).

  **Authentication**
  - Required scopes: `read:players`, `write:players`.
  - Authenticated by: `X-Talo-Player` + `X-Talo-Alias` + `X-Talo-Session`.
