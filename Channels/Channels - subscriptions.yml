info:
  name: Channels - subscriptions
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/v1/game-channels/subscriptions"
  params:
    - name: propKey
      value: ""
      type: query
      disabled: true
    - name: propValue
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  List game channels that the player is subscribed to.

  **Authentication**
  - Required scope: `read:gameChannels`.
  - Authenticated by: `X-Talo-Alias`.

  **Query**
  - `propKey` (optional) - Only return channels with this prop key.
  - `propValue` (optional) - Only return channels with a matching prop key and value.
