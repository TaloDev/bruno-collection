info:
  name: Channels - find storage
  type: http
  seq: 12

http:
  method: GET
  url: "{{baseUrl}}/v1/game-channels/:channelId/storage?propKey={{propKey}}"
  params:
    - name: channelId
      value: "{{channelId}}"
      type: path
    - name: propKey
      value: "{{propKey}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get a single storage prop from a game channel.

  **Authentication**
  - Required scope: `read:gameChannels`.
  - Authenticated by: `X-Talo-Alias`.

  **Path**
  - `{{channelId}}` - The ID of the channel.

  **Query**
  - `propKey` - The key of the storage property to retrieve.
