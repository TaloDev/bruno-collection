info:
  name: Channels - get
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/v1/game-channels/:channelId"
  params:
    - name: channelId
      value: "{{channelId}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Find a game channel.

  **Authentication**
  - Required scope: `read:gameChannels`.

  **Path**
  - `{{channelId}}` - The ID of the channel.
